
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOLLAN MagicBlock - Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&family=Pirata+One&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        :root {
            --mb-purple: #9b59b6;
            --mb-black: #000000;
            --mb-white: #ffffff;
            --mb-grey: #1a1a1a;
            --mb-stone: #2a2a2e;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--mb-black);
            color: var(--mb-white);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-pirata {
            font-family: 'Pirata One', system-ui;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        canvas {
            image-rendering: pixelated;
        }
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 120%);
            pointer-events: none;
            z-index: 50;
        }
        .scanline {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.02) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2000;
            opacity: 0.3;
        }
        .btn-stone {
            position: relative;
            background: linear-gradient(145deg, #2c2c2e, #1a1a1c);
            border: 2px solid #3a3a3e;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s ease;
        }
        .btn-stone:hover {
            border-color: var(--mb-purple);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }
        .metal-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            pointer-events: none;
        }
        .btn-stone:hover .metal-shine {
            left: 150%;
            transition: left 0.6s ease;
        }
        .mb-logo {
            width: 40px;
            height: 40px;
            background: var(--mb-purple);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 15px var(--mb-purple);
        }
        .neon-glow {
            filter: drop-shadow(0 0 8px var(--mb-purple));
        }

        /* Level Up Animations */
        @keyframes golden-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,170,0,0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255,170,0,0.8)); }
        }
        .animate-golden-pulse {
            animation: golden-pulse 2s infinite ease-in-out;
        }
        .golden-gradient-text {
            background: linear-gradient(to bottom, #ffaa00, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "phaser": "https://esm.sh/phaser@^3.90.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="vignette"></div>
    <div class="scanline"></div>
    <div id="root" class="relative z-[100]"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
